<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Outbound Email Helper</title>
    <link rel="stylesheet" href="{{ prefix }}/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <div class="eyebrow">SALES TOOL</div>
          <h1 class="title">Outbound Email Helper</h1>
          <p class="subtitle">Generate cold outreach email sequences backed by company research.</p>
        </div>
        <div class="header-actions">
          <a class="ghost-button" href="/">Home</a>
        </div>
      </header>

      <!-- Generate Form -->
      <section class="card form-card">
        <h2 class="section-title">New Sequence</h2>
        <form id="generate-form">
          <div class="form-stack">
            <div class="form-group">
              <label for="company_url">Company URL</label>
              <input type="text" id="company_url" name="company_url" placeholder="e.g. acme.com" required />
            </div>
            <div class="form-row form-row-3">
              <div class="form-group">
                <label for="prospect_name">Prospect Name <span class="hint">(optional)</span></label>
                <input type="text" id="prospect_name" name="prospect_name" placeholder="e.g. Jane Smith" />
              </div>
              <div class="form-group">
                <label for="prospect_title">Title <span class="hint">(optional)</span></label>
                <input type="text" id="prospect_title" name="prospect_title" placeholder="e.g. VP of Engineering" />
              </div>
              <div class="form-group">
                <label for="department">Department <span class="hint">(optional)</span></label>
                <input type="text" id="department" name="department" placeholder="e.g. Product" />
              </div>
            </div>
            <div class="actions">
              <button type="submit" class="primary" id="generate-btn">Generate Emails</button>
              <span class="status" id="generate-status"></span>
            </div>
          </div>
        </form>
      </section>

      <!-- Streaming Output -->
      <section class="card output-card" id="output-card" style="display:none">
        <div class="output-header">
          <h2 class="section-title" id="output-title">Generating...</h2>
        </div>
        <div class="output-area" id="output-area"></div>
      </section>

      <!-- Results: Email Cards -->
      <section id="results-section" style="display:none">
        <div class="results-header">
          <h2 class="section-title" id="results-title">Email Sequence</h2>
        </div>
        <div class="ai-summary" id="ai-summary"></div>
        <div class="email-cards" id="email-cards"></div>
        <div class="results-actions">
          <button class="ghost-button" id="export-btn">Export .md</button>
          <button class="ghost-button danger" id="delete-btn">Delete</button>
        </div>
      </section>

      <!-- Saved Sequences -->
      <section class="saved-section" id="saved-section">
        <h2 class="section-title">Saved Sequences</h2>
        <div id="saved-list" class="saved-list"></div>
        <div class="empty-state" id="saved-empty">No sequences yet.</div>
      </section>
    </div>

    <script>window.APP_PREFIX = "{{ prefix }}";</script>
    <script src="{{ prefix }}/static/app.js"></script>
  </body>
</html>
