<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prompt Library</title>
    <link rel="stylesheet" href="{{ prefix }}/static/style.css" />
  </head>
  <body data-page="index">
    <div class="container">
      <header class="header">
        <div>
          <div class="eyebrow">Library</div>
          <h1 class="title">Prompt Library</h1>
        </div>
        <div class="header-actions">
          <a class="ghost-button" href="/">Home</a>
          <a class="ghost-button" href="{{ prefix }}/search">Search</a>
        </div>
      </header>

      <section class="type-bar" id="type-bar"></section>

      <section class="tag-bar" id="tag-bar"></section>

      <section class="prompt-grid" id="prompt-grid"></section>

      <div class="load-more-wrap">
        <button id="load-more" class="ghost-button" style="display:none">Load more</button>
      </div>
    </div>

    <script>window.APP_PREFIX = "{{ prefix }}";</script>
    <script src="{{ prefix }}/static/app.js"></script>
  </body>
</html>
