<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prompt</title>
    <link rel="stylesheet" href="{{ prefix }}/static/style.css" />
  </head>
  <body data-page="prompt" data-prompt-slug="{{ prompt_slug }}">
    <div class="container">
      <header class="header">
        <div>
          <div class="eyebrow">Prompt</div>
          <h1 class="title" id="prompt-title">Loading...</h1>
        </div>
        <div class="header-actions">
          <a class="ghost-button" href="/">Home</a>
          <a class="ghost-button" href="{{ prefix }}/">Back</a>
        </div>
      </header>

      <div id="prompt-detail"></div>
    </div>

    <script>window.APP_PREFIX = "{{ prefix }}";</script>
    <script src="{{ prefix }}/static/app.js"></script>
  </body>
</html>
