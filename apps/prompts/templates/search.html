<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search Prompts</title>
    <link rel="stylesheet" href="{{ prefix }}/static/style.css" />
  </head>
  <body data-page="search">
    <div class="container">
      <header class="header">
        <div>
          <div class="eyebrow">Search</div>
          <h1 class="title">Find a prompt</h1>
        </div>
        <div class="header-actions">
          <a class="ghost-button" href="/">Home</a>
          <a class="ghost-button" href="{{ prefix }}/">Back</a>
        </div>
      </header>

      <section class="card">
        <label class="label" for="search-input">Search prompts</label>
        <input id="search-input" class="search-input" type="search" placeholder="decision, email, stakeholder..." />
        <div id="search-meta" class="status"></div>
      </section>

      <section class="prompt-grid" id="search-results" style="margin-top: 20px"></section>
    </div>

    <script>window.APP_PREFIX = "{{ prefix }}";</script>
    <script src="{{ prefix }}/static/app.js"></script>
  </body>
</html>
