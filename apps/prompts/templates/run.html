<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Run Prompt</title>
    <link rel="stylesheet" href="{{ prefix }}/static/style.css" />
  </head>
  <body data-page="run" data-prompt-slug="{{ prompt_slug }}">
    <div class="container">
      <header class="header">
        <div>
          <div class="eyebrow">Run</div>
          <h1 class="title" id="run-title">Loading...</h1>
        </div>
        <div class="header-actions">
          <a class="ghost-button" href="/">Home</a>
          <a class="ghost-button" id="back-link" href="{{ prefix }}/">Back</a>
        </div>
      </header>

      <section class="card">
        <div class="section-title">Variables</div>
        <form id="run-form"></form>
      </section>

      <section class="code-card">
        <div class="section-title">Preview</div>
        <pre class="code-panel" id="preview-panel"></pre>
        <div class="actions" style="margin-top: 16px">
          <button type="button" class="primary" id="copy-btn">Copy to clipboard</button>
          <span id="copy-status" class="status"></span>
        </div>
      </section>
    </div>

    <script>window.APP_PREFIX = "{{ prefix }}";</script>
    <script src="{{ prefix }}/static/app.js"></script>
  </body>
</html>
