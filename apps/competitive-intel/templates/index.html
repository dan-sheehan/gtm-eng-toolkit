<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Competitive Intelligence</title>
    <link rel="stylesheet" href="{{ prefix }}/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <div class="eyebrow">Sales Tool</div>
          <h1 class="title">Competitive Intelligence</h1>
          <p class="subtitle">Research competitors and build strategic intelligence.</p>
        </div>
        <div class="header-actions">
          <a class="ghost-button" href="/">Home</a>
        </div>
      </header>

      <!-- Analysis Form -->
      <section class="card form-card">
        <h2 class="section-title">New Analysis</h2>
        <form id="analyze-form">
          <div class="form-stack">
            <div class="form-row form-row-2">
              <div class="form-group">
                <label for="company_name">Company or Competitor Name / URL</label>
                <input type="text" id="company_name" name="company_name" placeholder="e.g. Slack, notion.so, Figma" required />
              </div>
              <div class="form-group">
                <label for="analysis_type">Analysis Type</label>
                <select id="analysis_type" name="analysis_type">
                  <option value="general">General Intel</option>
                  <option value="battlecard">Battlecard</option>
                  <option value="comparison">Comparison</option>
                </select>
              </div>
            </div>
            <div class="actions">
              <button type="submit" class="primary" id="analyze-btn">Analyze</button>
              <span class="status" id="analyze-status"></span>
            </div>
          </div>
        </form>
      </section>

      <!-- Streaming Output -->
      <section class="card output-card" id="output-card" style="display:none">
        <div class="output-header">
          <h2 class="section-title" id="output-title">Analyzing...</h2>
        </div>
        <div class="output-area" id="output-area"></div>
      </section>

      <!-- Results -->
      <section id="results-section" style="display:none">
        <div class="card result-card">
          <h2 class="section-title" id="result-company-title">Analysis</h2>

          <div class="result-block">
            <h3 class="result-heading">Summary</h3>
            <p id="result-summary" class="result-text"></p>
          </div>

          <div class="result-block">
            <h3 class="result-heading">Key Updates</h3>
            <div id="result-updates"></div>
          </div>

          <div class="result-block">
            <h3 class="result-heading">Positioning</h3>
            <p id="result-positioning" class="result-text"></p>
          </div>

          <div class="result-block">
            <h3 class="result-heading">Strategic Actions</h3>
            <ul class="bullet-list" id="result-actions"></ul>
          </div>
        </div>

        <div class="results-actions">
          <button class="ghost-button" id="export-btn">Export .md</button>
          <button class="ghost-button danger" id="delete-btn">Delete</button>
        </div>
      </section>

      <!-- Saved Analyses -->
      <section class="saved-section" id="saved-section">
        <h2 class="section-title">Saved Analyses</h2>
        <div id="saved-list" class="saved-list"></div>
        <div class="empty-state" id="saved-empty">No analyses yet.</div>
      </section>
    </div>

    <script>window.APP_PREFIX = "{{ prefix }}";</script>
    <script src="{{ prefix }}/static/app.js"></script>
  </body>
</html>
