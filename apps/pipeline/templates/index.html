<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pipeline Dashboard</title>
    <link rel="stylesheet" href="{{ prefix }}/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <div class="eyebrow">Revenue Operations</div>
          <h1 class="title">Pipeline Dashboard</h1>
          <p class="subtitle">Track deals, monitor pipeline health, and measure conversion metrics.</p>
        </div>
        <div class="header-actions">
          <a class="ghost-button" href="/">Home</a>
          <button class="ghost-button" id="seed-btn">Load Sample Data</button>
          <button class="primary" id="add-deal-btn">Add Deal</button>
        </div>
      </header>

      <!-- Metrics -->
      <section class="metrics-grid" id="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">Total Pipeline</div>
          <div class="metric-value" id="metric-total">$0</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Weighted Pipeline</div>
          <div class="metric-value" id="metric-weighted">$0</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Avg Deal Size</div>
          <div class="metric-value" id="metric-avg">$0</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Win Rate</div>
          <div class="metric-value" id="metric-winrate">0%</div>
        </div>
      </section>

      <!-- Funnel -->
      <section class="card" id="funnel-card">
        <h2 class="section-title">Pipeline Funnel</h2>
        <div id="funnel-area"></div>
      </section>

      <!-- Deal Table -->
      <section class="card" id="deals-card">
        <div class="deals-header">
          <h2 class="section-title">Deals</h2>
          <select id="stage-filter">
            <option value="">All Stages</option>
            <option value="prospecting">Prospecting</option>
            <option value="discovery">Discovery</option>
            <option value="proposal">Proposal</option>
            <option value="negotiation">Negotiation</option>
            <option value="closed_won">Closed Won</option>
            <option value="closed_lost">Closed Lost</option>
          </select>
        </div>
        <div id="deals-table-area"></div>
        <div class="empty-state" id="deals-empty">No deals yet. Add a deal or load sample data.</div>
      </section>

      <!-- Add Deal Modal -->
      <div class="modal-overlay" id="modal-overlay" style="display:none">
        <div class="modal card">
          <h2 class="section-title">Add Deal</h2>
          <form id="deal-form">
            <div class="form-stack">
              <div class="form-group">
                <label for="deal-company">Company</label>
                <input type="text" id="deal-company" required />
              </div>
              <div class="form-row-2">
                <div class="form-group">
                  <label for="deal-contact">Contact</label>
                  <input type="text" id="deal-contact" />
                </div>
                <div class="form-group">
                  <label for="deal-value">Value ($)</label>
                  <input type="number" id="deal-value" min="0" step="1000" />
                </div>
              </div>
              <div class="form-row-2">
                <div class="form-group">
                  <label for="deal-stage">Stage</label>
                  <select id="deal-stage">
                    <option value="prospecting">Prospecting</option>
                    <option value="discovery">Discovery</option>
                    <option value="proposal">Proposal</option>
                    <option value="negotiation">Negotiation</option>
                    <option value="closed_won">Closed Won</option>
                    <option value="closed_lost">Closed Lost</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="deal-close">Expected Close</label>
                  <input type="date" id="deal-close" />
                </div>
              </div>
              <div class="actions">
                <button type="submit" class="primary">Add Deal</button>
                <button type="button" class="ghost-button" id="modal-cancel">Cancel</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>window.APP_PREFIX = "{{ prefix }}";</script>
    <script src="{{ prefix }}/static/app.js"></script>
  </body>
</html>
