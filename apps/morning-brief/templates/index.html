<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GTM Signal Dashboard</title>
  <link rel="stylesheet" href="{{ prefix }}/static/style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <div class="eyebrow">Daily Intelligence</div>
        <h1 class="title">GTM Signals</h1>
      </div>
      <div class="header-actions">
        <span id="timestamp" class="timestamp"></span>
        <a class="ghost-button" href="/">Home</a>
        <button id="refresh-btn" class="ghost-button">Refresh</button>
      </div>
    </header>

    <div id="error-banner" class="error-banner" style="display:none"></div>

    <section class="card" id="pipeline-card">
      <div class="section-title">Pipeline Alerts</div>
      <div class="card-body placeholder">Loading...</div>
    </section>

    <section class="card" id="competitive-card">
      <div class="section-title">Competitive Signals</div>
      <div class="card-body placeholder">Loading...</div>
    </section>

    <section class="card" id="accounts-card">
      <div class="section-title">Account Signals</div>
      <div class="card-body placeholder">Loading...</div>
    </section>

    <section class="card" id="market-card">
      <div class="section-title">Market Signals</div>
      <div class="card-body placeholder">Loading...</div>
    </section>
  </div>

  <script>window.APP_PREFIX = "{{ prefix }}";</script>
  <script src="{{ prefix }}/static/app.js"></script>
</body>
</html>
