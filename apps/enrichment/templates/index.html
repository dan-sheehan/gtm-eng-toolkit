<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enrichment Chain</title>
    <link rel="stylesheet" href="{{ prefix }}/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <div class="eyebrow">Data Pipeline</div>
          <h1 class="title">Enrichment Chain</h1>
          <p class="subtitle">Multi-step company enrichment pipeline — web research, tech stack, funding signals, and competitive landscape.</p>
        </div>
        <div class="header-actions">
          <a class="ghost-button" href="/">Home</a>
        </div>
      </header>

      <!-- Enrichment Form -->
      <section class="card form-card">
        <h2 class="section-title">Enrich a Company</h2>
        <form id="enrich-form">
          <div class="form-stack">
            <div class="form-group">
              <label for="company">Company Name</label>
              <input type="text" id="company" name="company" placeholder="e.g. Stripe, Datadog, Figma" required />
            </div>
            <div class="actions">
              <button type="submit" class="primary" id="enrich-btn">Run Enrichment</button>
              <span class="status" id="enrich-status"></span>
            </div>
          </div>
        </form>
      </section>

      <!-- Pipeline Steps -->
      <section class="card" id="pipeline-card" style="display:none">
        <h2 class="section-title">Enrichment Pipeline</h2>
        <div id="pipeline-steps"></div>
      </section>

      <!-- Results -->
      <section class="card" id="results-card" style="display:none">
        <h2 class="section-title" id="results-title">Enrichment Results</h2>
        <div id="results-area"></div>
      </section>

      <!-- Saved Enrichments -->
      <section class="saved-section">
        <h2 class="section-title">Past Enrichments</h2>
        <div id="saved-list" class="saved-list"></div>
        <div class="empty-state" id="saved-empty">No enrichments run yet.</div>
      </section>
    </div>

    <script>window.APP_PREFIX = "{{ prefix }}";</script>
    <script src="{{ prefix }}/static/app.js"></script>
  </body>
</html>
