<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prompt Builder</title>
    <link rel="stylesheet" href="{{ prefix }}/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <div class="eyebrow">SALES TOOL</div>
          <h1 class="title">Prompt Builder</h1>
          <p class="subtitle">Generate tailored meeting memory prompts for clients.</p>
        </div>
        <div class="header-actions">
          <a class="ghost-button" href="/">Home</a>
        </div>
      </header>

      <!-- Generate Form -->
      <section class="card form-card">
        <h2 class="section-title">New Prompt Set</h2>
        <form id="generate-form">
          <div class="form-stack">
            <div class="form-group">
              <label for="company_url">Company URL</label>
              <input type="text" id="company_url" name="company_url" placeholder="e.g. acme.com, stripe.com" required />
            </div>
            <div class="form-row form-row-2">
              <div class="form-group">
                <label for="target_role">Target Role <span class="hint">(optional)</span></label>
                <input type="text" id="target_role" name="target_role" placeholder="e.g. Account Executive, VP Sales" />
              </div>
              <div class="form-group">
                <label for="target_department">Target Department <span class="hint">(optional)</span></label>
                <input type="text" id="target_department" name="target_department" placeholder="e.g. Revenue Operations, CS" />
              </div>
            </div>
            <div class="actions">
              <button type="submit" class="primary" id="generate-btn">Generate Prompts</button>
              <span class="status" id="generate-status"></span>
            </div>
          </div>
        </form>
      </section>

      <!-- Streaming Output -->
      <section class="card output-card" id="output-card" style="display:none">
        <div class="output-header">
          <h2 class="section-title" id="output-title">Generating...</h2>
        </div>
        <div class="output-area" id="output-area"></div>
      </section>

      <!-- Results Cards -->
      <section id="results-section" style="display:none">
        <div class="results-header">
          <h2 class="section-title" id="results-title">Generated Prompts</h2>
          <span class="tone-badge" id="tone-badge"></span>
        </div>
        <div id="prompts-list" class="prompts-list"></div>
        <div class="results-actions">
          <button class="ghost-button" id="export-btn">Export .md</button>
          <button class="ghost-button danger" id="delete-btn">Delete</button>
        </div>
      </section>

      <!-- Saved Prompt Sets -->
      <section class="saved-section" id="saved-section">
        <h2 class="section-title">Saved Prompt Sets</h2>
        <div id="saved-list" class="saved-list"></div>
        <div class="empty-state" id="saved-empty">No prompt sets yet.</div>
      </section>
    </div>

    <script>window.APP_PREFIX = "{{ prefix }}";</script>
    <script src="{{ prefix }}/static/app.js"></script>
  </body>
</html>
