<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Discovery Call Prep</title>
    <link rel="stylesheet" href="{{ prefix }}/static/style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <div class="eyebrow">Sales Tool</div>
          <h1 class="title">Discovery Call Prep</h1>
          <p class="subtitle">Research companies and prospects before your next call.</p>
        </div>
        <div class="header-actions">
          <a class="ghost-button" href="/">Home</a>
        </div>
      </header>

      <!-- Research Form -->
      <section class="card form-card">
        <h2 class="section-title">New Research</h2>
        <form id="research-form">
          <div class="form-stack">
            <div class="form-row form-row-2">
              <div class="form-group">
                <label for="company_url">Company URL</label>
                <input type="text" id="company_url" name="company_url" placeholder="e.g. acme.com, example.io" required />
              </div>
              <div class="form-group">
                <label for="prospect_name">Prospect Name</label>
                <input type="text" id="prospect_name" name="prospect_name" placeholder="e.g. Jane Smith" required />
              </div>
            </div>
            <div class="form-group">
              <label for="selling_as">Selling As <span class="hint">(optional — loads company context)</span></label>
              <select id="selling_as" name="selling_as">
                <option value="">Generic (no company context)</option>
              </select>
            </div>
            <div class="actions">
              <button type="submit" class="primary" id="research-btn">Research</button>
              <span class="status" id="research-status"></span>
            </div>
          </div>
        </form>
      </section>

      <!-- Streaming Output -->
      <section class="card output-card" id="output-card" style="display:none">
        <div class="output-header">
          <h2 class="section-title" id="output-title">Researching...</h2>
        </div>
        <div class="output-area" id="output-area"></div>
      </section>

      <!-- Results Cards -->
      <section id="results-section" style="display:none">
        <div class="results-grid">
          <!-- Company Card -->
          <div class="card result-card">
            <h2 class="section-title" id="company-title">About the Company</h2>
            <ul class="bullet-list" id="company-bullets"></ul>
          </div>

          <!-- Prospect Card -->
          <div class="card result-card">
            <h2 class="section-title" id="prospect-title">About the Prospect</h2>
            <div class="field-rows" id="prospect-fields"></div>
            <ul class="bullet-list" id="prospect-bullets"></ul>
          </div>
        </div>

        <div class="results-actions">
          <button class="primary" id="save-btn" style="display:none">Save Changes</button>
          <button class="ghost-button" id="export-btn">Export .md</button>
          <button class="ghost-button danger" id="delete-btn">Delete</button>
        </div>
      </section>

      <!-- Saved Preps -->
      <section class="saved-section" id="saved-section">
        <h2 class="section-title">Saved Preps</h2>
        <div id="saved-list" class="saved-list"></div>
        <div class="empty-state" id="saved-empty">No call preps yet.</div>
      </section>
    </div>

    <script>window.APP_PREFIX = "{{ prefix }}";</script>
    <script src="{{ prefix }}/static/app.js"></script>
  </body>
</html>
